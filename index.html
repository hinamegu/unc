<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>unc card</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap"
      rel="stylesheet"
    />
    <style>
      #mainTitle {
        font-size: 48px;
        font-family: 'Geist Pixel', sans-serif;
        margin-bottom: 8px;
      }

      .subTitle {
        transition: opacity 0.8s ease;
        opacity: 1;
        font-size: 32px;
        font-family: 'Geist Pixel', sans-serif;
        color: #555;
      }

      .fade-out {
        opacity: 0;
      }
      
      #letterButton {
        background: #f27987;
        border: 3px solid #555;
        border-radius: 8px;
        color: #fff7d6;
        display: inline-block;
        margin-top: 12px;
        padding: 12px 20px;
        font-size: 32px;
        font-family: "Geist Pixel", sans-serif;
        text-decoration: none;

        opacity: 0;
        pointer-events: none;
        transform: translateY(10px);

        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }

      #letterButton.show {
        opacity:1;
        pointer-events: auto;
        transform: translateY(0);
      }

      #letterButton:hover {
        transform: translateY(-6px)
      }

      #letterButton:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="birthdayText"></div>
      <div class="cake-container">
        <div class="cake" id="cake"></div>
      </div>

      <a
        id="letterButton"
        href="20!.pdf"
        target="_blank"
        rel="noopener noreferrer"
        >
          open letter! ♡
      </a>
    </div>

    <script>
      // Read URL params
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "Blair";
      let candleCount = parseInt(params.get("candles")) || 4;
      candleCount = Math.min(Math.max(candleCount, 1), 30);

      const birthdayText = document.getElementById("birthdayText");
      birthdayText.innerHTML = `
        <div id="mainTitle">happy birthday blair! (˶ˆᗜˆ˵)</div>

        <div class="subTitle" id="subtitle1"> 
          it's not much, but i hope u like this gift! i'll buy u real cake in da future
        </div>

        <div class="subTitle" id="subtitle2"> 
          make a wish and blow da candles~ i love u smmmm <3
        </div>
        
        <div class="subTitle" id="subtitle3"> 
          - sincerely, angel!
        </div>
      `;

      const cake = document.getElementById("cake");

      const colors = [
        "green-candle",
        "purple-candle",
        "blue-candle",
        "yellow-candle",
      ];
      const CAKE_VISUAL_WIDTH = 35;

      function createCandles(count) {
        cake.innerHTML = "";
        const CANDLE_VISUAL_WIDTH = 2;
        const availableWidth = CAKE_VISUAL_WIDTH;
        const candlesPerRow = 6;
        const rowCount = Math.ceil(count / candlesPerRow);
        const shiftAmount = 4;

        for (let i = 0; i < count; i++) {
          const candle = document.createElement("div");
          candle.classList.add("candle");
          const colorClass = colors[Math.floor(Math.random() * colors.length)];
          candle.classList.add(colorClass);

          const row = Math.floor(i / candlesPerRow);
          const col = i % candlesPerRow;
          const totalCandlesInRow = Math.min(
            candlesPerRow,
            count - row * candlesPerRow
          );
          const rowSpacing = availableWidth / (totalCandlesInRow + 1);

          const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
          const rowShift = row % 2 === 0 ? 0 : shiftAmount;

          candle.style.position = "absolute";
          candle.style.top = `${10 + row * 3}px`;
          candle.style.left = `${leftBase - rowShift + 4}px`;

          cake.appendChild(candle);
        }
      }

      createCandles(candleCount);

      // === Microphone / Blow Detection ===
      async function startMicDetection() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          const audioContext = new (window.AudioContext ||
            window.webkitAudioContext)();
          const source = audioContext.createMediaStreamSource(stream);
          const analyser = audioContext.createAnalyser();
          analyser.fftSize = 512;

          source.connect(analyser);

          const dataArray = new Uint8Array(analyser.fftSize);

          let blown = false;

          function detectBlow() {
            analyser.getByteTimeDomainData(dataArray);

            let sum = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const sample = (dataArray[i] - 128) / 128;
                sum += sample * sample
            }

            const rms = Math.sqrt(sum / dataArray.length);

            console.log(rms);

            const BLOW_THRESHOLD = 0.12;

            if (rms > BLOW_THRESHOLD && !blown) {
              blown = true;
              blowOutCandles();
            }

            requestAnimationFrame(detectBlow);
          }

          detectBlow();
        } catch (err) {
          console.error("Mic access error:", err);
        }
      }

      function blowOutCandles() {
        const candles = document.querySelectorAll(".candle");
        candles.forEach((candle) => {
          const delay = Math.random() * 1000;
          setTimeout(() => {
            colors.forEach((color) => {
              if (candle.classList.contains(color)) {
                candle.classList.add("blown");
              }
            });
          }, delay);
        });

        // Brief delay after blowing the candles
        subtitle1.classList.add("fade-out");
        subtitle2.classList.add("fade-out");
        subtitle3.classList.add("fade-out");

        setTimeout(() => {
          subtitle1.textContent = "yayy we did it, unc! ur an old man now hehe :3"
          subtitle2.textContent = "i hope all ur wishes come true! eat a lot of good food today <3"
          subtitle3.textContent = "here's another gift~"
 
          subtitle1.classList.remove("fade-out");
          subtitle2.classList.remove("fade-out");
          subtitle3.classList.remove("fade-out");
        }, 2400);

         setTimeout(() => {
          const letterButton = document.getElementById("letterButton");
          letterButton.classList.add("show");
        }, 3500);
      }

      startMicDetection();
    </script>
  </body>
</html>
